<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Opening in IDE...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f4f5f7;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 2rem 3rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      text-align: center;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #ddd;
      border-top-color: #0052cc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #0052cc; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>Opening in IDE…</h2>
    <p id="status">Launching JetBrains IDE</p>
    <p><small><a id="link" href="#">Click here if nothing happens</a></small></p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const target = params.get("url");
    const ALLOWED = ["jetbrains://", "idea://", "vscode://"];

    if (target && ALLOWED.some(p => target.startsWith(p))) {
      document.getElementById("link").href = target;
      document.getElementById("status").textContent = decodeURIComponent(target).slice(0, 60) + "…";
      setTimeout(() => { window.location = target; }, 500);
    } else {
      document.querySelector(".spinner").style.display = "none";
      document.querySelector("h2").textContent = "❌ Invalid link";
      document.getElementById("status").textContent = "Missing or disallowed URL parameter.";
      document.getElementById("link").style.display = "none";
    }
  </script>
</body>
</html>
